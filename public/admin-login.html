<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Dagi Tattoo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 120px 20px;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }
    h1 {
      color: #ff4444;
    }
    input {
      padding: 15px;
      font-size: 18px;
      width: 300px;
      margin: 15px 0;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #ff4444;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #ff6666;
    }
  </style>
</head>
<body>
  <h1>🔐 Admin Login</h1>
  <p>Dagi Tattoo Studio</p>
  
  <form action="/admin/login" method="POST">
    <input type="password" name="password" placeholder="Enter Password" required />
    <br /><br />
    <button type="submit">Login</button>
  </form>
</body>
</html>
